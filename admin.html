<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CINEMAX Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <link rel="stylesheet" href="admin.css?v=20260601-payment-qr-mobile" />
</head>
<body class="bg-[#09090b] text-white min-h-screen">
  <div class="max-w-7xl mx-auto p-4 md:p-8">
    <header class="flex flex-wrap items-center justify-between gap-4 mb-8">
      <div>
        <h1 class="text-3xl font-black tracking-tight">CINEMAX Admin</h1>
        <p class="text-gray-400 text-sm">Manager and regional admin panels with isolated logins, separated permissions, and cinema operations.</p>
      </div>
      <a href="index.html" class="btn-muted">Back to Website</a>
      <div class="admin-header-actions">
        <button id="admin-refresh-btn" class="btn-muted" type="button">Refresh Data</button>
        <button id="admin-logout-btn" class="btn-muted hidden" type="button">Sign Out</button>
        <span id="admin-refresh-status" class="refresh-status">Waiting for login</span>
      </div>
    </header>

    <div id="access-warning" class="hidden card border-red-500/30 bg-red-500/10 mb-6">
      <h2 class="font-black text-red-300 mb-2">Admin access required</h2>
      <p class="text-sm text-gray-300">Choose Manager Admin or Regional / Staff sign in. Each uses an isolated session.</p>
    </div>

    <nav class="flex flex-wrap gap-2 mb-6">
      <button class="tab active" data-tab="dashboard">Dashboard</button>
      <button class="tab full-admin-only" data-tab="sync">TMDB Sync</button>
      <button class="tab regional-only" data-tab="cinemas">Cinemas</button>
      <button class="tab regional-only" data-tab="payments">Payments</button>
      <button class="tab regional-only" data-tab="refunds">Refund Requests</button>
      <button class="tab regional-only" data-tab="support">Support</button>
      <button class="tab full-admin-only" data-tab="manager">Manager</button>
      <button class="tab full-admin-only" data-tab="forgot">Forgot Password</button>
    </nav>

    <main>
      <section id="tab-dashboard" class="tab-panel"></section>
      <section id="tab-sync" class="tab-panel hidden"></section>
      <section id="tab-cinemas" class="tab-panel hidden"></section>
      <section id="tab-payments" class="tab-panel hidden"></section>
      <section id="tab-refunds" class="tab-panel hidden"></section>
      <section id="tab-support" class="tab-panel hidden"></section>
      <section id="tab-manager" class="tab-panel hidden"></section>
      <section id="tab-forgot" class="tab-panel hidden"></section>
    </main>
  </div>

  <script src="admin.js?v=20260601-admin-session-isolation"></script>
</body>
</html>
